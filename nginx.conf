# LostPeople RD - Configuracion de Nginx para produccion
# Colocar en /etc/nginx/sites-available/lostpeople
# Luego: sudo ln -s /etc/nginx/sites-available/lostpeople /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name lostpeople.gob.do www.lostpeople.gob.do;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lostpeople.gob.do www.lostpeople.gob.do;

    # SSL - Configurar con certificado real (Let's Encrypt / Digicert)
    ssl_certificate /etc/ssl/certs/lostpeople.crt;
    ssl_certificate_key /etc/ssl/private/lostpeople.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com 'unsafe-inline'; style-src 'self' https://cdn.tailwindcss.com 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none';";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy a la app ASP.NET
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # Archivos estaticos
    location /uploads/ {
        alias /var/www/lostpeople/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/lostpeople_access.log;
    error_log /var/log/nginx/lostpeople_error.log;
}
